name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@dc6353517c68c2d08c16c9705a94e86057c4399a  # stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@6849a6489940f00c2f30c0fb92c6274307ccb58a  # v4.2.2
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --workspace --all-features

      - name: Test
        run: cargo test --workspace --all-features

      - name: Clippy
        run: cargo clippy --workspace --all-features -- -D warnings

      - name: Format check
        run: cargo fmt --all -- --check

  msrv:
    name: MSRV check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Read MSRV from workspace
        id: read-msrv
        run: |
          MSRV=$(sed -n 's/rust-version *= *"\([0-9.]*\)".*/\1/p' Cargo.toml)
          echo "msrv=$MSRV" >> $GITHUB_OUTPUT

      - name: Install MSRV Rust
        uses: dtolnay/rust-toolchain@dc6353517c68c2d08c16c9705a94e86057c4399a  # @${{ steps.read-msrv.outputs.msrv }}
        with:
          toolchain: ${{ steps.read-msrv.outputs.msrv }}

      - name: Check MSRV
        run: cargo +${{ steps.read-msrv.outputs.msrv }} check --workspace
