# cargo-deny configuration for hl7-rs
# https://embarkstudios.github.io/cargo-deny/

# Deny all advisories unless explicitly allowed
[advisories]
version = 2
yanked = "deny"
ignore = []

# License checking
[licenses]
version = 2

# Allow-list
allow = [
    "Apache-2.0",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "OpenSSL",
]

# Exceptions for specific crates if needed
# [[licenses.exceptions]]
# name = "crate_name_if_needed"
# allow = ["LicenseRef-exception"]
# reason = "Commercial license or specific justification"

# Bans - duplicate dependency checking
[bans]
# Warn on multiple versions of the same crate
multiple-versions = "warn"
# Wildcards are fine in workspace root for path dependencies
wildcards = "allow"
# Highlight specific crates with duplicates (optional)
# highlight = "all"

# Skip certain duplicate checks if unavoidable
skip = []
skip-tree = []

# Sources - ensure we only use crates.io
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
