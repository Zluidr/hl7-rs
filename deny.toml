# cargo-deny configuration for hl7-rs
# https://embarkstudios.github.io/cargo-deny/

# Deny all advisories unless explicitly allowed
[advisories]
version = 2
yanked = "deny"
ignore = []

# License checking
[licenses]
version = 2

# Allow-list
allow = [
    "Apache-2.0",
    "MIT",
    "Apache-2.0 OR MIT",
    "MIT OR Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "OpenSSL",
]

# Explicitly deny copyleft and BUSL licenses
deny = [
    "GPL-2.0",
    "GPL-2.0-or-later",
    "GPL-3.0",
    "GPL-3.0-or-later",
    "AGPL-1.0",
    "AGPL-3.0",
    "LGPL-2.0",
    "LGPL-2.1",
    "LGPL-3.0",
    "BUSL-1.1",
    "CDDL-1.0",
    "CDDL-1.1",
    "CPL-1.0",
    "EPL-1.0",
    "EPL-2.0",
    "MPL-1.0",
    "MPL-1.1",
    "MPL-2.0",
]

# The Unlicense and CC0-1.0 are fine for public domain code
allow-osi-fsf-free = "both"
copyleft = "deny"

# Exceptions for specific crates if needed
[[licenses.exceptions]]
name = "crate_name_if_needed"
allow = ["LicenseRef-exception"]
reason = "Commercial license or specific justification"

# Bans - duplicate dependency checking
[bans]
# Warn on multiple versions of the same crate
multiple-versions = "warn"
# Wildcards are fine in workspace root for path dependencies
wildcards = "allow"
# Certain crates we want to highlight duplicates for
highlight = ["serde", "tokio", "reqwest"]

# Skip certain duplicate checks if unavoidable
skip = []
skip-tree = []

# Sources - ensure we only use crates.io
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
